name: cypurge_mobile
description: Cypurge mobile app for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  local_auth: ^3.0.1
  image_picker: ^1.2.2
  flutter_secure_storage: ^10.0.0
  biometric_storage: ^5.0.0
  uuid: ^4.5.3
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.11.0
  grpc: ^5.1.0
  protobuf: ^6.0.0
  pointycastle: ^3.9.1
  image: ^4.5.3
  app_links: ^6.3.2
  mobile_scanner: ^7.0.0
  flutter_appauth: ^7.0.1
  http: ^1.3.0
  fluent_ui: ^4.13.0
  fixnum: ^1.1.1
  intl: ^0.20.2
  crypto: ^3.0.3
  file_picker: ^8.1.4
  workmanager: ^0.9.0
  geolocator: ^10.1.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^5.0.3
  carrier_info: ^3.0.1
  permission_handler: ^11.3.1
  sensors_plus: ^5.0.1
  device_info_plus: ^9.1.1
  video_player: ^2.11.1
  hugeicons: ^1.1.7
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app icon.png"
  min_sdk_size: 21
  web:
    generate: true
    image_path: "app icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Quasimoda
      fonts:
        - asset: "assets/Quasimoda Regular.otf"
